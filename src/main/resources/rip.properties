# Download threads to use per ripper
threads.size = 4

# Overwrite existing files
file.overwrite = true

# Number of retries on failed downloads
download.retries = 3

# File download timeout (in milliseconds)
download.timeout = 6000

# Page download timeout (in milliseconds)
page.timeout = 5000

# Maximum size of downloaded files in bytes (required)
download.max_size = 104857600

# maximum file downloads
maxdownloads = 250

# Don't retry on 404 errors
error.skip404 = true

# Pause a ripper after this many consecutive HTTP 4xx/5xx errors (0 disables)
errors.consecutive_http.failures = 50

# API creds
# Deprecated: X/Twitter no longer uses oauth2 client credentials. Kept for old configs only.
twitter.auth =
# Optional override for X web bearer token. Leave blank to use the built-in public web-client token.
twitter.access_token =
# GraphQL query IDs (from X web client / TumblThree). Update if X rotates them.
twitter.graphql.user_by_screen_name = xc8f1g7BYqr6VTzTbvNlGw
twitter.graphql.user_tweets = 2GIWTr7XwadIixZDtyXd4A
twitter.graphql.search_timeline = R0u1RWRf748KzyGBXvOYRA
# X/Twitter ripping requires a logged-in Firefox session (auth_token + ct0), or cookies.x.com=
tumblr.auth = JFNLu3CbINQjRdUvZibXW9VpSEVYYtiPJ86o8YmvgLZIoKyuNX
gw.api = gonewild


twitter.max_requests = 40
twitter.max_items_request = 20
twitter.rip_retweets = false
twitter.exclude_replies = true

clipboard.autorip = true

download.save_order = false

## Reddit ripper configs
# Determines whether or not to filter reddit ripping by upvote
# Enables the reddit.min_upvotes and reddit.max_upvotes properties when true
reddit.rip_by_upvote = false

# Only rips file if the number of upvotes is equal to or greater than this value
# Requires reddit.rip_by_upvote = true
reddit.min_upvotes = 0

# Only rips files if the number of upvotes is less than this value
# Requires reddit.rip_by_upvote = true
reddit.max_upvotes = 10000
auto.update = true
log.level = Log level: Info
play.sound = false
download.show_popup = false
log.save = true
urls_only.save = false
album_titles.save = false
descriptions.save = false
prefer.mp4 = true
# Temporary: coomer.st is down and there is no working alternate domain yet.
coomer.enabled = false
coomer.download.videos = true
remember.url_history = true
lang = en-US
rips.directory = E:\\Work Pics\\Models\\Downloaded
ssl.verify.off = false
download.retry.sleep = 1000
window.position = true

## Facebook ripper configs
# A profile's /photos tab is loaded a page at a time via Facebook's GraphQL API. RipMe replays that
# query to download the whole album. RipMe also tries to read doc_id from the page HTML automatically;
# update this fallback when Facebook ships a new site build and pagination still stops at ~10 photos.
# Capture a fresh "ProfileCometAppCollectionPhotosRendererPaginationQuery" request from DevTools.
facebook.photos_doc_id = 27028962643386672
facebook.photos_query_name = ProfileCometAppCollectionPhotosRendererPaginationQuery
# Photos requested per GraphQL page (Facebook's site uses 8).
facebook.photos_page_size = 8
# Safety cap on the number of pagination requests (8 photos each) per album.
facebook.max_listing_pages = 400
# Fallback only: cap on individual photo permalinks fetched when GraphQL is unavailable.
facebook.max_photo_pages = 1000
# Delay between Facebook requests, in milliseconds, to avoid rate limiting.
facebook.photo_page_delay_ms = 300

# DeviantArt: load session cookies from Firefox when logged in there (default true).
# Also supports cookies.deviantart.com and serialized DeviantartLogin.cookies in config.
deviantart.firefox.cookies = true

